<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ancre AR imprimable</title>
  <script src="/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      color: #111;
      background: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #fff;
      color: #111;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
    }

    p {
      margin: 0 0 20px;
      font-size: 18px;
    }

    .sheet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 12px 0 8px;
    }

    .marker-block {
      width: 100mm;
      max-width: 100%;
    }

    .marker-title {
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 700;
    }

    .marker-image {
      display: block;
      width: 100mm;
      height: 100mm;
      max-width: 100%;
      margin: 0 auto;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      box-shadow: 0 8px 30px rgb(0 0 0 / 0.12);
    }

    .tracking-note {
      max-width: 560px;
      font-size: 15px;
      line-height: 1.45;
    }

    .qr-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border: 2px solid #111;
    }

    #qr {
      width: 120px;
      height: 120px;
      background: #fff;
    }

    #qr img,
    #qr canvas {
      display: block;
      width: 120px !important;
      height: 120px !important;
      margin: 0;
    }

    .actions {
      margin-top: 18px;
    }

    button {
      padding: 12px 20px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: #17384d;
      font: inherit;
      cursor: pointer;
    }

    button:hover { background: #245878; }

    @media print {
      @page { size: auto; margin: 10mm; }

      h1, p, .actions { display: none; }

      main { max-width: none; padding: 0; }

      .sheet { gap: 14px; }

      .marker-image {
        width: 100mm;
        height: 100mm;
        box-shadow: none;
      }

      .tracking-note {
        max-width: 100mm;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Ancre AR — Coffre</h1>
    <p>Imprime à 100 % sans ajustement automatique.</p>

    <div class="sheet">
      <div class="marker-block">
        <div id="title" class="marker-title">O Cofre Escondido</div>
        <img class="marker-image" src="/chest-marker-v2.png" alt="Marqueur AR coffre noir et blanc" />
      </div>

      <div class="tracking-note">
        Scanne le QR code pour ouvrir l’expérience, puis vise tout le coffre noir et blanc.
        Garde le carré entier dans l’image, bien à plat, avec une bonne lumière.
      </div>

      <div class="qr-block">
        <div id="qr" aria-label="QR code"></div>
        <div>Ouvrir l’expérience</div>
      </div>
    </div>

    <div class="actions">
      <button type="button" onclick="window.print()">Imprimer</button>
    </div>
  </main>

  <script>
    const config = window.APP_CONFIG || {};
    const publicUrl = config.publicUrl || window.location.origin;
    const targetUrl = `${publicUrl.replace(/\/+$/, "")}/`;

    document.querySelector("#title").textContent = config.barName || "O Cofre Escondido";

    const qrContainer = document.querySelector("#qr");
    if (typeof QRCode === "undefined") {
      qrContainer.textContent = "QR indisponible";
      console.error("QRCode library failed to load");
    } else {
      new QRCode(qrContainer, {
        text: targetUrl,
        width: 120,
        height: 120,
        colorDark: "#111111",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  </script>
</body>
</html>

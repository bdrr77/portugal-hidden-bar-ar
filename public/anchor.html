<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />

  <title>Ancre AR imprimable</title>

  <script src="/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      font-family: system-ui, sans-serif;
      color: #17384d;
      background: #ece7d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ece7d8;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(28px, 5vw, 42px);
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 18px;
    }

    .anchor {
      position: relative;
      width: 100mm;
      height: 100mm;
      max-width: 100%;
      margin: 20px auto;
      overflow: hidden;
      border: 4px solid #17384d;
      background:
        repeating-linear-gradient(
          45deg,
          #f4f0df 0 20px,
          #2467a2 20px 24px,
          #f4f0df 24px 44px
        );
      box-shadow: 0 10px 40px rgb(0 0 0 / 20%);
    }

    .title {
      position: absolute;
      top: 12px;
      left: 15px;
      right: 15px;
      z-index: 3;
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: #17384d;
    }

    .chest {
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 12%;
      height: 55%;
      border: 10px solid #3a1c0d;
      border-radius: 45% 45% 10px 10px;
      background:
        linear-gradient(
          180deg,
          #9a4f24 0%,
          #a95b2a 45%,
          #7a3519 46%,
          #7a3519 100%
        );
    }

    .chest::before,
    .chest::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 14px;
      background: #c89a34;
    }

    .chest::before {
      top: 38%;
    }

    .chest::after {
      bottom: 12%;
    }

    .marker {
      position: absolute;
      left: 50%;
      top: 56%;
      width: 104px;
      height: 104px;
      padding: 7px;
      transform: translate(-50%, -50%);
      border: 8px solid #c89a34;
      background: #c89a34;
    }

    .marker img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    #qr {
      position: absolute;
      top: 68px;
      right: 18px;
      z-index: 4;
      width: 108px;
      height: 108px;
      padding: 6px;
      border: 4px solid #17384d;
      background: #fff;
    }

    #qr img,
    #qr canvas {
      display: block;
      width: 88px !important;
      height: 88px !important;
      margin: 0;
    }

    .instruction {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      z-index: 3;
      font-size: 12px;
      font-weight: 700;
      color: #17384d;
    }

    .actions {
      margin-top: 18px;
    }

    button {
      padding: 12px 20px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: #17384d;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #245878;
    }

    @media print {
      @page {
        size: auto;
        margin: 0;
      }

      body {
        background: white;
      }

      h1,
      p,
      .actions {
        display: none;
      }

      main {
        padding: 0;
      }

      .anchor {
        width: 100mm;
        height: 100mm;
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Ancre AR — 10 × 10 cm</h1>

    <p>
      Imprime à 100 %, sans ajustement automatique.
    </p>

    <div class="anchor">
      <div id="title" class="title">
        O Cofre Escondido
      </div>

      <div class="chest">
        <div class="marker">
          <img src="/hiro-marker.png" alt="Marqueur AR Hiro" />
        </div>
      </div>

      <div id="qr" aria-label="QR code"></div>

      <div class="instruction">
        Scanne le QR puis vise la serrure.
      </div>
    </div>

    <div class="actions">
      <button type="button" onclick="window.print()">
        Imprimer
      </button>
    </div>
  </main>

  <script>
    const config = window.APP_CONFIG || {};

    const publicUrl =
      config.publicUrl ||
      window.location.origin;

    const targetUrl =
      `${publicUrl.replace(/\/+$/, "")}/`;

    const title =
      document.querySelector("#title");

    title.textContent =
      config.barName ||
      "O Cofre Escondido";

    const qrContainer =
      document.querySelector("#qr");

    if (typeof QRCode === "undefined") {
      qrContainer.textContent =
        "QR indisponible";

      console.error(
        "QRCode library failed to load"
      );
    } else {
      new QRCode(qrContainer, {
        text: targetUrl,
        width: 88,
        height: 88,
        colorDark: "#111111",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#102f45" />
  <title>La Matrissse</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/config.js"></script>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <div id="intro" class="panel">
    <div class="card">
      <div class="crest">☠</div>
      <h1 id="bar-name">La Matrissse</h1>
      <p>Autorise la caméra, puis cherche l'entrée du bar.</p>
      <button id="start" type="button">Entrer dans le bar caché</button>
    </div>
  </div>

  <div id="hint" class="hint hidden">I imagine that right now you're feeling a bit like Alice</div>

  <!--
    Screen-space choice panel. It is deliberately outside the A-Frame scene,
    so it remains stable and can be tapped directly without aiming a cursor.
  -->
  <section id="choice-overlay" class="choice-overlay hidden" aria-labelledby="choice-title">
    <div class="choice-dialog">
      <p class="choice-kicker">Le coffre est ouvert</p>
      <h2 id="choice-title">Blue pill or red pill?</h2>
      <p class="choice-copy">Choisis ton chemin.</p>

      <div class="pill-actions">
        <button id="blue-pill" class="pill-button pill-button--blue" type="button">
          <span class="pill-name">BLUE PILL</span>
        </button>

        <button id="red-pill" class="pill-button pill-button--red" type="button">
          <span class="pill-name">RED PILL</span>
        </button>
      </div>
    </div>
  </section>

  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.5;"
  >
    <a-marker
      id="marker"
      type="pattern"
      url="/pattern-chest-v2.patt"
      emitevents="true"
      smooth="true"
      smooth-count="12"
      smooth-tolerance="0.01"
      smooth-threshold="5"
    ></a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script type="module" src="/app.js"></script>
</body>
</html>

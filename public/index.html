<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#102f45" />
  <title>O Cofre Escondido</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/config.js"></script>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <div id="intro" class="panel">
    <div class="card">
      <div class="crest">☠</div>
      <h1 id="bar-name">O Cofre Escondido</h1>
      <p>Autorise la caméra, puis vise la serrure dorée du coffre.</p>
      <button id="start">Entrer dans le bar caché</button>
      <a href="/anchor.html" class="secondary">Afficher / imprimer l’ancre</a>
    </div>
  </div>

  <div id="hint" class="hint hidden">Vise la serrure dorée du coffre, puis touche le sceau.</div>

  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
  >
    <a-marker id="marker" type="pattern" url="/pattern-lock.patt" emitevents="true">
      <a-entity id="scroll" position="0 0.65 0" rotation="-90 0 0" scale="0.01 0.01 0.01" visible="false">
        <a-plane
          width="2.8"
          height="1.75"
          color="#d9bd7b"
          material="side: double; roughness: 1"
          shadow
        ></a-plane>

        <a-text
          value="A CARTA DOS NAVEGADORES"
          color="#34200f"
          align="center"
          width="2.4"
          position="0 .55 .035"
        ></a-text>

        <a-entity id="menu-lines" position="0 .18 .04"></a-entity>

        <a-circle
          id="seal"
          class="clickable"
          radius=".18"
          position="0 -.62 .08"
          color="#8b1d1d"
          material="roughness: .7"
        ></a-circle>
        <a-text
          value="ABRIR"
          color="#f3d78c"
          align="center"
          width=".8"
          position="0 -.64 .095"
        ></a-text>
      </a-entity>
    </a-marker>

    <a-entity camera>
      <a-cursor
        raycaster="objects: .clickable"
        fuse="false"
        cursor="rayOrigin: mouse"
      ></a-cursor>
    </a-entity>
  </a-scene>

  <script type="module" src="/app.js"></script>
</body>
</html>

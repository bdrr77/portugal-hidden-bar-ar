<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />

  <title>AR.js Custom Lock Marker Test</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #status {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 99999;
      padding: 14px;
      border-radius: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.78);
      font-family: system-ui, sans-serif;
      font-size: 16px;
      text-align: center;
      pointer-events: none;
    }

    #status.found {
      background: rgba(0, 120, 40, 0.9);
    }

  </style>
</head>

<body>
  <div id="status">
    Starting camera…
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="
      sourceType: webcam;
      debugUIEnabled: true;
      detectionMode: mono;
    "
  >
    <a-marker
      id="lock-marker"
      type="pattern"
      url="/pattern-lock.patt"
      emitevents="true"
    >
      <a-box
        position="0 0.5 0"
        rotation="0 45 0"
        scale="0.7 0.7 0.7"
        color="#ff0000"
        animation="
          property: rotation;
          to: 0 405 0;
          loop: true;
          dur: 2500;
          easing: linear;
        "
      ></a-box>

      <a-text
        value="LOCK DETECTED"
        position="0 1.4 0"
        rotation="-90 0 0"
        align="center"
        color="#ffff00"
        width="4"
      ></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const status = document.querySelector("#status");
    const marker = document.querySelector("#lock-marker");

    marker.addEventListener("markerFound", () => {
      status.textContent = "Custom lock marker detected";
      status.classList.add("found");
      console.log("markerFound");
    });

    marker.addEventListener("markerLost", () => {
      status.textContent = "Marker lost — show the complete marker";
      status.classList.remove("found");
      console.log("markerLost");
    });

    window.addEventListener("load", () => {
      setTimeout(() => {
        const video = document.querySelector("#arjs-video");

        if (!video) {
          status.textContent = "Camera video element was not created";
          return;
        }

        status.textContent =
          `Camera active: ${video.videoWidth || "?"} × ${video.videoHeight || "?"}. ` +
          "Point at the complete custom lock marker.";
      }, 3000);
    });
  </script>
</body>
</html>

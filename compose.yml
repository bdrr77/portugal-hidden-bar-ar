services:
  hidden-bar-ar:
    image: ghcr.io/YOUR_GITHUB_USER/YOUR_REPOSITORY:latest
    container_name: hidden-bar-ar
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PUBLIC_URL: "https://bar.example.com"
      BAR_NAME: "O Cofre Escondido"
      DRINKS: >-
        [
          {"name":"Porto Tónico","detail":"Porto branco, tónica, limão"},
          {"name":"Ginjinha","detail":"Licor de ginja"},
          {"name":"Poncha da Madeira","detail":"Aguardente, mel, citrinos"},
          {"name":"Navegador","detail":"Rum escuro, ananás, canela"},
          {"name":"Maré Alta","detail":"Sans alcool — lima, hortelã, soda"}
        ]

      OFFICIAL_DRINKS: >-
        [
          {"name":"Super Bock","detail":"Portuguese lager"},
          {"name":"Sagres","detail":"Portuguese lager"},
          {"name":"Vinho Verde","detail":"Fresh Portuguese white wine"},
          {"name":"Douro Tinto","detail":"Red wine from the Douro Valley"},
          {"name":"Porto","detail":"Portuguese fortified wine"},
          {"name":"Água com Gás","detail":"Sparkling mineral water"}
        ]
